<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloque Digital — Cotizador de proyectos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --concrete:#E7E4DC;
    --white:#FAFAF8;
    --charcoal:#1E1C1A;
    --slate:#54575D;
    --slate-soft:#8B8E93;
    --yellow:#F2B705;
    --yellow-dark:#C08A00;
    --line: rgba(30,28,26,.14);
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--concrete);
    color:var(--charcoal);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:60px 20px;
  }
  .display{ font-family:'Space Grotesk', sans-serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  .app{ width:100%; max-width:620px; }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:36px;
  }
  .brand-mark{ width:26px; height:26px; position:relative; flex-shrink:0; }
  .brand-mark .b1{ position:absolute; left:0; bottom:0; width:7px; height:12px; background:var(--slate); }
  .brand-mark .b2{ position:absolute; left:10px; bottom:0; width:7px; height:19px; background:var(--charcoal); }
  .brand-mark .b3{ position:absolute; left:20px; bottom:0; width:7px; height:26px; background:var(--yellow); }
  .brand-name{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:1.15rem; letter-spacing:-.01em; }
  .brand-tag{ font-family:'IBM Plex Mono', monospace; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; color:var(--slate); margin-top:2px; }

  .progress{
    display:flex;
    gap:6px;
    margin-bottom:40px;
  }
  .progress .block{
    flex:1;
    height:6px;
    background:rgba(30,28,26,.12);
    position:relative;
    overflow:hidden;
  }
  .progress .block::after{
    content:'';
    position:absolute; inset:0;
    background:var(--yellow);
    transform:translateX(-100%);
    transition:transform .5s var(--ease);
  }
  .progress .block.done::after{ transform:translateX(0); }

  .card{
    background:var(--white);
    padding:44px 40px;
    min-height:340px;
    display:flex;
    flex-direction:column;
  }
  @media (max-width:600px){ .card{ padding:32px 24px; } }

  .step-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:.7rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--yellow-dark);
    margin-bottom:14px;
  }
  .pregunta{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:1.5rem;
    line-height:1.3;
    margin-bottom:28px;
  }
  .opciones{
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
  }
  .opcion{
    text-align:left;
    padding:16px 18px;
    border:1.5px solid var(--line);
    background:transparent;
    font-family:'Inter', sans-serif;
    font-size:.96rem;
    color:var(--charcoal);
    cursor:pointer;
    transition:border-color .2s var(--ease), background .2s var(--ease);
  }
  .opcion:hover{ border-color:var(--charcoal); }
  .opcion.selected{ border-color:var(--charcoal); background:var(--charcoal); color:var(--white); }

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:28px;
  }
  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:.78rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    padding:12px 22px;
    cursor:pointer;
    border:none;
    transition:opacity .2s var(--ease), transform .2s var(--ease);
  }
  .btn-primary{ background:var(--charcoal); color:var(--white); }
  .btn-primary:disabled{ opacity:.3; cursor:not-allowed; }
  .btn-primary:not(:disabled):hover{ transform:translateY(-2px); }
  .btn-ghost{ background:transparent; color:var(--slate); }
  .btn-ghost:hover{ color:var(--charcoal); }

  /* ---------- RESULTADO ---------- */
  .resultado{ display:none; }
  .resultado.show{ display:block; }
  .resultado .card{ min-height:auto; }

  .torre{
    display:flex;
    flex-direction:column-reverse;
    gap:5px;
    width:60px;
    margin-bottom:26px;
  }
  .torre .b{
    height:12px;
    background:var(--concrete);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .35s var(--ease), background .35s var(--ease);
  }
  .torre .b.on{ background:var(--yellow); transform:scaleX(1); }

  .paquete-nombre{ font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--yellow-dark); font-family:'IBM Plex Mono', monospace; }
  .paquete-titulo{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:2rem; margin:8px 0 6px; }
  .paquete-precio{ font-family:'IBM Plex Mono', monospace; font-size:1.3rem; color:var(--charcoal); margin-bottom:8px; }
  .paquete-subtitulo{ font-size:.92rem; color:var(--slate); margin-bottom:22px; }

  .incluye{ list-style:none; margin-bottom:24px; }
  .incluye li{
    padding:10px 0;
    border-top:1px solid var(--line);
    font-size:.92rem;
    display:flex;
    gap:10px;
  }
  .incluye li:last-child{ border-bottom:1px solid var(--line); }
  .incluye li::before{ content:'▪'; color:var(--yellow-dark); }
  .incluye li b{ font-weight:600; }

  .notas{
    background:var(--concrete);
    padding:16px 18px;
    font-size:.86rem;
    color:var(--slate);
    margin-bottom:24px;
  }
  .notas strong{ color:var(--charcoal); }

  .result-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .copiado{
    font-family:'IBM Plex Mono', monospace;
    font-size:.78rem;
    color:var(--yellow-dark);
    display:none;
    align-self:center;
  }
  .copiado.show{ display:inline; }
</style>
</head>
<body>

<div class="app">
  <div class="brand">
    <div class="brand-mark"><div class="b1"></div><div class="b2"></div><div class="b3"></div></div>
    <div>
      <div class="brand-name">BLOQUE DIGITAL</div>
      <div class="brand-tag">Cotizador de proyectos web</div>
    </div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="quiz" id="quiz">
    <div class="card">
      <div class="step-label" id="stepLabel">Pregunta 1 de 6</div>
      <div class="pregunta" id="preguntaTexto"></div>
      <div class="opciones" id="opciones"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btnAtras">← Atrás</button>
        <button class="btn btn-primary" id="btnSiguiente" disabled>Siguiente →</button>
      </div>
    </div>
  </div>

  <div class="resultado" id="resultado">
    <div class="card">
      <div class="torre" id="torre"></div>
      <div class="paquete-nombre">Recomendación</div>
      <div class="paquete-titulo" id="paqueteTitulo"></div>
      <div class="paquete-precio" id="paquetePrecio"></div>
      <div class="paquete-subtitulo" id="paqueteSubtitulo"></div>
      <ul class="incluye" id="paqueteIncluye"></ul>
      <div class="notas" id="notas"></div>
      <div class="result-actions">
        <a href="checkout-bloque-digital.html" id="btnReservar" class="btn btn-primary" style="text-decoration:none;">Reservar este paquete →</a>
        <button class="btn btn-primary" id="btnCopiar">Copiar resumen</button>
        <button class="btn btn-ghost" id="btnReiniciar">Empezar de nuevo</button>
        <span class="copiado" id="copiadoMsg">✓ Copiado</span>
      </div>
    </div>
  </div>
</div>

<script>
  const preguntas = [
    {
      id: 'secciones',
      texto: '¿Cuántas secciones necesita la página?',
      opciones: [
        { texto: 'Una sola página (landing)', puntos: 0 },
        { texto: 'Varias secciones: catálogo, nosotros, contacto', puntos: 2 },
        { texto: 'Un sistema completo con panel propio', puntos: 5 }
      ]
    },
    {
      id: 'catalogo',
      texto: '¿Necesita mostrar productos o servicios organizados?',
      opciones: [
        { texto: 'No vende como catálogo', puntos: 0 },
        { texto: 'Sí, una lista sencilla', puntos: 1 },
        { texto: 'Sí, con categorías y filtros', puntos: 2 }
      ]
    },
    {
      id: 'mensajes',
      texto: '¿Qué tan importante es que no se pierda ningún mensaje de cliente?',
      opciones: [
        { texto: 'Poco, con que llegue al correo basta', puntos: 0 },
        { texto: 'Importante, quiero que quede guardado', puntos: 2 },
        { texto: 'Crítico, quiero control total y organizado', puntos: 3 }
      ]
    },
    {
      id: 'administradores',
      texto: '¿Cuántas personas van a revisar esos mensajes o pedidos?',
      opciones: [
        { texto: 'Solo el dueño', puntos: 0 },
        { texto: 'El dueño y un empleado de confianza', puntos: 2 },
        { texto: 'Varias personas, cada una con su acceso', puntos: 5 }
      ]
    },
    {
      id: 'whatsapp',
      texto: '¿Quiere que los clientes puedan escribirle directo por WhatsApp desde la página?',
      opciones: [
        { texto: 'No es necesario', puntos: 0 },
        { texto: 'Sí, sería un plus', puntos: 0 }
      ]
    },
    {
      id: 'dominio',
      texto: '¿Ya tiene un dominio propio? (ej. tunegocio.com)',
      opciones: [
        { texto: 'Sí, ya tengo uno', puntos: 0 },
        { texto: 'No, necesito ayuda para conseguirlo', puntos: 0 }
      ]
    },
    {
      id: 'tipoProyecto',
      texto: '¿Es un proyecto nuevo o quiere mejorar una página que ya tiene?',
      opciones: [
        { texto: 'Nueva, empezamos desde cero', puntos: 0 },
        { texto: 'Ya tengo una página y quiero mejorarla', puntos: 0 }
      ]
    },
    {
      id: 'contenido',
      texto: '¿Ya tiene fotos, textos y logo listos para usar?',
      opciones: [
        { texto: 'Sí, todo listo', puntos: 0 },
        { texto: 'Tengo algo, falta organizarlo', puntos: 0 },
        { texto: 'No tengo nada todavía', puntos: 0 }
      ]
    },
    {
      id: 'plazo',
      texto: '¿En cuánto tiempo la necesita?',
      opciones: [
        { texto: 'Sin prisa, 1-2 meses está bien', puntos: 0 },
        { texto: 'Normal, en 2-4 semanas', puntos: 0 },
        { texto: 'Urgente, en menos de 2 semanas', puntos: 0 }
      ]
    },
    {
      id: 'mantenimiento',
      texto: '¿Le interesa contratar mantenimiento mensual desde ahora?',
      opciones: [
        { texto: 'Sí, quiero incluirlo', puntos: 0 },
        { texto: 'Tal vez más adelante', puntos: 0 },
        { texto: 'No por ahora', puntos: 0 }
      ]
    }
  ];

  const paquetes = {
    basico: {
      nombre: 'Básico — Presencia digital',
      precio: '$6,000 MXN',
      subtitulo: 'Para negocios que apenas necesitan presencia digital.',
      bloques: 3,
      incluye: [
        '<b>Página de una sola sección (landing)</b>, con diseño hecho a tu medida — no una plantilla genérica',
        '<b>Se ve bien en cualquier pantalla:</b> celular, tablet o computadora',
        '<b>Formulario de contacto</b> que te llega directo a tu correo o WhatsApp',
        'Hasta 10 fotos de tu negocio o productos',
        '1 ronda de cambios después de la primera entrega'
      ]
    },
    profesional: {
      nombre: 'Profesional — Negocio completo',
      precio: '$12,000 MXN',
      subtitulo: 'Para negocios que venden productos o servicios y necesitan verse serios.',
      bloques: 6,
      incluye: [
        'Todo lo del plan Básico',
        '<b>Sitio con varias secciones o páginas</b> (catálogo, nosotros, contacto, etc.)',
        '<b>Catálogo con filtros:</b> tus productos organizados por categoría, para que el cliente encuentre rápido lo que busca',
        '<b>Base de datos real:</b> cada mensaje o pedido que te manden queda guardado — no se pierde aunque cierres WhatsApp o borres el correo',
        'Animaciones y detalles visuales a la medida de tu marca',
        '2 rondas de cambios'
      ]
    },
    premium: {
      nombre: 'Premium — Negocio con panel propio',
      precio: '$22,000 MXN',
      subtitulo: 'Para negocios que quieren controlar todo desde su propio sistema.',
      bloques: 10,
      incluye: [
        'Todo lo del plan Profesional',
        '<b>Panel de administrador propio:</b> entras con tu usuario y contraseña y ves todos tus pedidos o mensajes organizados',
        '<b>Varios administradores:</b> puedes dar acceso a más personas de tu equipo, cada quien con su propio usuario',
        '<b>Estadísticas en vivo:</b> cuántos pedidos llevas, cuántos son de hoy — sin tener que contarlos a mano',
        '<b>SEO básico</b> (para que te encuentren mejor en Google) + soporte prioritario los primeros 30 días'
      ]
    }
  };

  let paso = 0;
  const respuestas = new Array(preguntas.length).fill(null);

  const progressEl = document.getElementById('progress');
  progressEl.innerHTML = preguntas.map(() => `<div class="block"></div>`).join('');

  function renderPregunta(){
    const p = preguntas[paso];
    document.getElementById('stepLabel').textContent = `Pregunta ${paso + 1} de ${preguntas.length}`;
    document.getElementById('preguntaTexto').textContent = p.texto;
    document.getElementById('opciones').innerHTML = p.opciones.map((op, i) => `
      <button class="opcion ${respuestas[paso] === i ? 'selected' : ''}" data-i="${i}">${op.texto}</button>
    `).join('');

    document.querySelectorAll('.progress .block').forEach((b, i) => b.classList.toggle('done', i < paso));
    document.getElementById('btnAtras').style.visibility = paso === 0 ? 'hidden' : 'visible';
    document.getElementById('btnSiguiente').textContent = paso === preguntas.length - 1 ? 'Ver recomendación →' : 'Siguiente →';
    document.getElementById('btnSiguiente').disabled = respuestas[paso] === null;

    document.querySelectorAll('.opcion').forEach(btn => {
      btn.addEventListener('click', () => {
        respuestas[paso] = +btn.dataset.i;
        renderPregunta();
      });
    });
  }

  document.getElementById('btnSiguiente').addEventListener('click', () => {
    if (paso < preguntas.length - 1) {
      paso++;
      renderPregunta();
    } else {
      mostrarResultado();
    }
  });
  document.getElementById('btnAtras').addEventListener('click', () => {
    if (paso > 0) { paso--; renderPregunta(); }
  });

  // ====================================================================
  // CÁLCULO DEL PAQUETE RECOMENDADO
  // --------------------------------------------------------------------
  // Antes esto se decidía solo por puntaje acumulado, lo que a veces
  // recomendaba "Profesional" aunque el cliente hubiera pedido, en otras
  // preguntas, cosas que SOLO trae Premium (panel propio, varios
  // administradores). Ahora, si el cliente pide explícitamente alguna
  // de esas dos cosas, el resultado se va directo a Premium sin importar
  // el puntaje de las demás respuestas — porque pedir un panel con login
  // o varios accesos ES pedir Premium, por definición del paquete.
  // ====================================================================
  function calcularPaquete(){
    const idxSecciones = preguntas.findIndex(p => p.id === 'secciones');
    const idxAdministradores = preguntas.findIndex(p => p.id === 'administradores');

    const pidioPanelPropio = respuestas[idxSecciones] === 2; // "Un sistema completo con panel propio"
    const pidioVariosAdmins = respuestas[idxAdministradores] === 2; // "Varias personas, cada una con su acceso"

    const puntos = ['secciones','catalogo','mensajes','administradores'].reduce((sum, id) => {
      const i = preguntas.findIndex(p => p.id === id);
      const r = respuestas[i];
      return sum + (r !== null ? preguntas[i].opciones[r].puntos : 0);
    }, 0);

    if (pidioPanelPropio || pidioVariosAdmins || puntos >= 10) return 'premium';
    if (puntos >= 3) return 'profesional';
    return 'basico';
  }

  function mostrarResultado(){
    const key = calcularPaquete();
    const pack = paquetes[key];

    document.getElementById('quiz').style.display = 'none';
    document.getElementById('resultado').classList.add('show');

    document.getElementById('paqueteTitulo').textContent = pack.nombre;
    document.getElementById('paquetePrecio').textContent = pack.precio;
    document.getElementById('paqueteSubtitulo').textContent = pack.subtitulo;
    document.getElementById('paqueteIncluye').innerHTML = pack.incluye.map(t => `<li>${t}</li>`).join('');

    const torre = document.getElementById('torre');
    torre.innerHTML = Array.from({ length: 10 }).map(() => `<div class="b"></div>`).join('');
    const bloques = torre.querySelectorAll('.b');
    bloques.forEach((b, i) => {
      setTimeout(() => { if (i < pack.bloques) b.classList.add('on'); }, i * 60);
    });

    const idxWhatsapp = preguntas.findIndex(p => p.id === 'whatsapp');
    const idxDominio = preguntas.findIndex(p => p.id === 'dominio');
    const idxTipoProyecto = preguntas.findIndex(p => p.id === 'tipoProyecto');
    const idxContenido = preguntas.findIndex(p => p.id === 'contenido');
    const idxPlazo = preguntas.findIndex(p => p.id === 'plazo');
    const idxMantenimiento = preguntas.findIndex(p => p.id === 'mantenimiento');

    const quiereWhatsapp = respuestas[idxWhatsapp] === 1;
    const tieneDominio = respuestas[idxDominio] === 0;
    const esActualizacion = respuestas[idxTipoProyecto] === 1;
    const sinContenido = respuestas[idxContenido] === 2;
    const esUrgente = respuestas[idxPlazo] === 2;
    const quiereMantenimiento = respuestas[idxMantenimiento] === 0;

    const notasArr = [];
    if (esActualizacion) {
      notasArr.push('Como ya tiene una página, esto probablemente sea un upgrade en vez de un proyecto nuevo: de Básico a Profesional ($7,500 MXN) o de Profesional a Premium ($13,000 MXN), según lo que ya tenga construido.');
    }
    if (sinContenido) {
      notasArr.push('Como aún no tiene fotos, textos ni logo, hay que sumar tiempo (y posiblemente costo) para ayudarle a organizarlos antes de empezar a construir.');
    }
    if (esUrgente) {
      notasArr.push('Pidió el proyecto en menos de 2 semanas — un plazo urgente puede llevar un cargo adicional por prioridad.');
    }
    if (quiereMantenimiento) {
      notasArr.push('Quiere mantenimiento mensual desde ahora: $500 MXN/mes, incluye cambios de texto/fotos y hosting administrado.');
    } else {
      notasArr.push('Mantenimiento mensual disponible como opción a futuro: $500 MXN/mes.');
    }
    if (quiereWhatsapp) notasArr.push('Se incluye conexión directa a WhatsApp desde el formulario, sin costo extra.');
    if (!tieneDominio) notasArr.push('Falta cotizar el dominio propio aparte (~$300–800 MXN/año).');

    const notas = notasArr.join(' ');
    document.getElementById('notas').innerHTML = `<strong>Notas:</strong> ${notas}`;
    document.getElementById('btnReservar').href = `checkout-bloque-digital.html?paquete=${key}`;

    const incluyeTexto = pack.incluye.map(t => '- ' + t.replace(/<\/?b>/g, '')).join('\n');
    window._resumenTexto = `Cotización Bloque Digital
Paquete recomendado: ${pack.nombre}
Precio: ${pack.precio}
${pack.subtitulo}
Incluye:
${incluyeTexto}
${notas}`;
  }

  document.getElementById('btnCopiar').addEventListener('click', () => {
    const texto = window._resumenTexto || '';
    const area = document.createElement('textarea');
    area.value = texto;
    document.body.appendChild(area);
    area.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(area);
    const msg = document.getElementById('copiadoMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  });

  document.getElementById('btnReiniciar').addEventListener('click', () => {
    paso = 0;
    respuestas.fill(null);
    document.getElementById('resultado').classList.remove('show');
    document.getElementById('quiz').style.display = 'block';
    renderPregunta();
  });

  renderPregunta();
</script>
</body>
</html>
