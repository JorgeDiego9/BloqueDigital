<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloque Digital — Cotizador de proyectos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --concrete:#E7E4DC;
    --white:#FAFAF8;
    --charcoal:#1E1C1A;
    --slate:#54575D;
    --slate-soft:#8B8E93;
    --yellow:#F2B705;
    --yellow-dark:#C08A00;
    --line: rgba(30,28,26,.14);
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--concrete);
    color:var(--charcoal);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:60px 20px;
  }
  .display{ font-family:'Space Grotesk', sans-serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  .app{ width:100%; max-width:620px; }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:36px;
  }
  .brand-mark{
    width:34px; height:34px;
    background:var(--charcoal);
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::after{
    content:'';
    position:absolute;
    right:-7px; bottom:-7px;
    width:34px; height:34px;
    background:var(--yellow);
    z-index:-1;
  }
  .brand-name{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:1.15rem; letter-spacing:-.01em; }
  .brand-tag{ font-family:'IBM Plex Mono', monospace; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; color:var(--slate); margin-top:2px; }

  .progress{
    display:flex;
    gap:6px;
    margin-bottom:40px;
  }
  .progress .block{
    flex:1;
    height:6px;
    background:rgba(30,28,26,.12);
    position:relative;
    overflow:hidden;
  }
  .progress .block::after{
    content:'';
    position:absolute; inset:0;
    background:var(--yellow);
    transform:translateX(-100%);
    transition:transform .5s var(--ease);
  }
  .progress .block.done::after{ transform:translateX(0); }

  .card{
    background:var(--white);
    padding:44px 40px;
    min-height:340px;
    display:flex;
    flex-direction:column;
  }
  @media (max-width:600px){ .card{ padding:32px 24px; } }

  .step-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:.7rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--yellow-dark);
    margin-bottom:14px;
  }
  .pregunta{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:1.5rem;
    line-height:1.3;
    margin-bottom:28px;
  }
  .opciones{
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
  }
  .opcion{
    text-align:left;
    padding:16px 18px;
    border:1.5px solid var(--line);
    background:transparent;
    font-family:'Inter', sans-serif;
    font-size:.96rem;
    color:var(--charcoal);
    cursor:pointer;
    transition:border-color .2s var(--ease), background .2s var(--ease);
  }
  .opcion:hover{ border-color:var(--charcoal); }
  .opcion.selected{ border-color:var(--charcoal); background:var(--charcoal); color:var(--white); }

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:28px;
  }
  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:.78rem;
    letter-spacing:.05em;
    text-transform:uppercase;
    padding:12px 22px;
    cursor:pointer;
    border:none;
    transition:opacity .2s var(--ease), transform .2s var(--ease);
  }
  .btn-primary{ background:var(--charcoal); color:var(--white); }
  .btn-primary:disabled{ opacity:.3; cursor:not-allowed; }
  .btn-primary:not(:disabled):hover{ transform:translateY(-2px); }
  .btn-ghost{ background:transparent; color:var(--slate); }
  .btn-ghost:hover{ color:var(--charcoal); }

  /* ---------- RESULTADO ---------- */
  .resultado{ display:none; }
  .resultado.show{ display:block; }
  .resultado .card{ min-height:auto; }

  .torre{
    display:flex;
    flex-direction:column-reverse;
    gap:5px;
    width:60px;
    margin-bottom:26px;
  }
  .torre .b{
    height:12px;
    background:var(--concrete);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform .35s var(--ease), background .35s var(--ease);
  }
  .torre .b.on{ background:var(--yellow); transform:scaleX(1); }

  .paquete-nombre{ font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--yellow-dark); font-family:'IBM Plex Mono', monospace; }
  .paquete-titulo{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:2rem; margin:8px 0 6px; }
  .paquete-precio{ font-family:'IBM Plex Mono', monospace; font-size:1.3rem; color:var(--charcoal); margin-bottom:22px; }

  .incluye{ list-style:none; margin-bottom:24px; }
  .incluye li{
    padding:10px 0;
    border-top:1px solid var(--line);
    font-size:.92rem;
    display:flex;
    gap:10px;
  }
  .incluye li:last-child{ border-bottom:1px solid var(--line); }
  .incluye li::before{ content:'▪'; color:var(--yellow-dark); }

  .notas{
    background:var(--concrete);
    padding:16px 18px;
    font-size:.86rem;
    color:var(--slate);
    margin-bottom:24px;
  }
  .notas strong{ color:var(--charcoal); }

  .result-actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .copiado{
    font-family:'IBM Plex Mono', monospace;
    font-size:.78rem;
    color:var(--yellow-dark);
    display:none;
    align-self:center;
  }
  .copiado.show{ display:inline; }
</style>
</head>
<body>

<div class="app">
  <div class="brand">
    <div class="brand-mark"></div>
    <div>
      <div class="brand-name">BLOQUE DIGITAL</div>
      <div class="brand-tag">Cotizador de proyectos web</div>
    </div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="quiz" id="quiz">
    <div class="card">
      <div class="step-label" id="stepLabel">Pregunta 1 de 6</div>
      <div class="pregunta" id="preguntaTexto"></div>
      <div class="opciones" id="opciones"></div>
      <div class="nav-row">
        <button class="btn btn-ghost" id="btnAtras">← Atrás</button>
        <button class="btn btn-primary" id="btnSiguiente" disabled>Siguiente →</button>
      </div>
    </div>
  </div>

  <div class="resultado" id="resultado">
    <div class="card">
      <div class="torre" id="torre"></div>
      <div class="paquete-nombre">Recomendación</div>
      <div class="paquete-titulo" id="paqueteTitulo"></div>
      <div class="paquete-precio" id="paquetePrecio"></div>
      <ul class="incluye" id="paqueteIncluye"></ul>
      <div class="notas" id="notas"></div>
      <div class="result-actions">
        <button class="btn btn-primary" id="btnCopiar">Copiar resumen</button>
        <button class="btn btn-ghost" id="btnReiniciar">Empezar de nuevo</button>
        <span class="copiado" id="copiadoMsg">✓ Copiado</span>
      </div>
    </div>
  </div>
</div>

<script>
  const preguntas = [
    {
      id: 'secciones',
      texto: '¿Cuántas secciones necesita la página?',
      opciones: [
        { texto: 'Una sola página (landing)', puntos: 0 },
        { texto: 'Varias secciones: catálogo, nosotros, contacto', puntos: 2 },
        { texto: 'Un sistema completo con panel propio', puntos: 4 }
      ]
    },
    {
      id: 'catalogo',
      texto: '¿Necesita mostrar productos o servicios organizados?',
      opciones: [
        { texto: 'No vende como catálogo', puntos: 0 },
        { texto: 'Sí, una lista sencilla', puntos: 1 },
        { texto: 'Sí, con categorías y filtros', puntos: 2 }
      ]
    },
    {
      id: 'mensajes',
      texto: '¿Qué tan importante es que no se pierda ningún mensaje de cliente?',
      opciones: [
        { texto: 'Poco, con que llegue al correo basta', puntos: 0 },
        { texto: 'Importante, quiero que quede guardado', puntos: 2 },
        { texto: 'Crítico, quiero control total y organizado', puntos: 3 }
      ]
    },
    {
      id: 'administradores',
      texto: '¿Cuántas personas van a revisar esos mensajes o pedidos?',
      opciones: [
        { texto: 'Solo el dueño', puntos: 0 },
        { texto: 'El dueño y un empleado de confianza', puntos: 2 },
        { texto: 'Varias personas, cada una con su acceso', puntos: 3 }
      ]
    },
    {
      id: 'whatsapp',
      texto: '¿Quiere que los clientes puedan escribirle directo por WhatsApp desde la página?',
      opciones: [
        { texto: 'No es necesario', puntos: 0 },
        { texto: 'Sí, sería un plus', puntos: 0 }
      ]
    },
    {
      id: 'dominio',
      texto: '¿Ya tiene un dominio propio? (ej. tunegocio.com)',
      opciones: [
        { texto: 'Sí, ya tengo uno', puntos: 0 },
        { texto: 'No, necesito ayuda para conseguirlo', puntos: 0 }
      ]
    }
  ];

  const paquetes = {
    basico: {
      nombre: 'Básico — Presencia digital',
      precio: '$4,500 – $6,500 MXN',
      bloques: 3,
      incluye: [
        'Página de una sola sección, diseño a la medida',
        'Responsive: se ve bien en cualquier pantalla',
        'Formulario de contacto conectado a correo/WhatsApp',
        'Hasta 10 fotos de producto',
        '1 ronda de ajustes'
      ]
    },
    profesional: {
      nombre: 'Profesional — Negocio completo',
      precio: '$8,000 – $14,000 MXN',
      bloques: 6,
      incluye: [
        'Todo lo del plan Básico',
        'Sitio de varias secciones con catálogo y filtros',
        'Base de datos real para guardar los mensajes',
        'Animaciones y detalles de diseño a medida',
        '2 rondas de ajustes'
      ]
    },
    premium: {
      nombre: 'Premium — Negocio con panel propio',
      precio: '$18,000 – $30,000 MXN',
      bloques: 10,
      incluye: [
        'Todo lo del plan Profesional',
        'Panel de administración con login propio',
        'Cuentas para varios administradores',
        'Estadísticas y control de mensajes en vivo',
        'SEO básico + soporte prioritario 30 días'
      ]
    }
  };

  let paso = 0;
  const respuestas = new Array(preguntas.length).fill(null);

  const progressEl = document.getElementById('progress');
  progressEl.innerHTML = preguntas.map(() => `<div class="block"></div>`).join('');

  function renderPregunta(){
    const p = preguntas[paso];
    document.getElementById('stepLabel').textContent = `Pregunta ${paso + 1} de ${preguntas.length}`;
    document.getElementById('preguntaTexto').textContent = p.texto;
    document.getElementById('opciones').innerHTML = p.opciones.map((op, i) => `
      <button class="opcion ${respuestas[paso] === i ? 'selected' : ''}" data-i="${i}">${op.texto}</button>
    `).join('');

    document.querySelectorAll('.progress .block').forEach((b, i) => b.classList.toggle('done', i < paso));
    document.getElementById('btnAtras').style.visibility = paso === 0 ? 'hidden' : 'visible';
    document.getElementById('btnSiguiente').textContent = paso === preguntas.length - 1 ? 'Ver recomendación →' : 'Siguiente →';
    document.getElementById('btnSiguiente').disabled = respuestas[paso] === null;

    document.querySelectorAll('.opcion').forEach(btn => {
      btn.addEventListener('click', () => {
        respuestas[paso] = +btn.dataset.i;
        renderPregunta();
      });
    });
  }

  document.getElementById('btnSiguiente').addEventListener('click', () => {
    if (paso < preguntas.length - 1) {
      paso++;
      renderPregunta();
    } else {
      mostrarResultado();
    }
  });
  document.getElementById('btnAtras').addEventListener('click', () => {
    if (paso > 0) { paso--; renderPregunta(); }
  });

  function calcularPaquete(){
    const puntos = ['secciones','catalogo','mensajes','administradores'].reduce((sum, id, idx) => {
      const i = preguntas.findIndex(p => p.id === id);
      const r = respuestas[i];
      return sum + (r !== null ? preguntas[i].opciones[r].puntos : 0);
    }, 0);
    if (puntos <= 3) return 'basico';
    if (puntos <= 7) return 'profesional';
    return 'premium';
  }

  function mostrarResultado(){
    const key = calcularPaquete();
    const pack = paquetes[key];

    document.getElementById('quiz').style.display = 'none';
    document.getElementById('resultado').classList.add('show');

    document.getElementById('paqueteTitulo').textContent = pack.nombre;
    document.getElementById('paquetePrecio').textContent = pack.precio;
    document.getElementById('paqueteIncluye').innerHTML = pack.incluye.map(t => `<li>${t}</li>`).join('');

    const torre = document.getElementById('torre');
    torre.innerHTML = Array.from({ length: 10 }).map(() => `<div class="b"></div>`).join('');
    const bloques = torre.querySelectorAll('.b');
    bloques.forEach((b, i) => {
      setTimeout(() => { if (i < pack.bloques) b.classList.add('on'); }, i * 60);
    });

    const idxWhatsapp = preguntas.findIndex(p => p.id === 'whatsapp');
    const idxDominio = preguntas.findIndex(p => p.id === 'dominio');
    const quiereWhatsapp = respuestas[idxWhatsapp] === 1;
    const tieneDominio = respuestas[idxDominio] === 0;

    let notas = 'Mantenimiento mensual opcional: $300 – $800 MXN/mes.';
    if (quiereWhatsapp) notas += ' Se incluye conexión directa a WhatsApp desde el formulario, sin costo extra.';
    if (!tieneDominio) notas += ' Falta cotizar el dominio propio aparte (~$300–800 MXN/año).';
    document.getElementById('notas').innerHTML = `<strong>Notas:</strong> ${notas}`;

    window._resumenTexto = `Cotización Bloque Digital
Paquete recomendado: ${pack.nombre}
Precio estimado: ${pack.precio}
Incluye:
${pack.incluye.map(t => '- ' + t).join('\n')}
${notas}`;
  }

  document.getElementById('btnCopiar').addEventListener('click', () => {
    const texto = window._resumenTexto || '';
    const area = document.createElement('textarea');
    area.value = texto;
    document.body.appendChild(area);
    area.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(area);
    const msg = document.getElementById('copiadoMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  });

  document.getElementById('btnReiniciar').addEventListener('click', () => {
    paso = 0;
    respuestas.fill(null);
    document.getElementById('resultado').classList.remove('show');
    document.getElementById('quiz').style.display = 'block';
    renderPregunta();
  });

  renderPregunta();
</script>
</body>
</html>
